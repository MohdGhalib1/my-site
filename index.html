<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاتصالات المتكامل - محامص الشعب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-container" id="loginPage">
    <div class="login-box">
        <h2 style="color:var(--accent-red);margin-bottom:10px;">محامص الشعب</h2>
        <input type="password" id="passInput" placeholder="أدخل الرقم الوظيفي" onkeypress="if(event.key==='Enter')login()">
        <button class="btn btn-main" style="width:100%;margin-top:15px" onclick="login()">دخول</button>
    </div>
</div>

<!-- ══ MAIN APP ══ -->
<div class="main-wrapper" id="mainApp">
    <div class="sidebar">
        <div style="padding:0 25px 20px;text-align:center;">
            <h3 style="margin:0;color:var(--accent-red);font-size:18px;">محامص الشعب</h3>
            <small style="color:var(--text-dim)">بوابة الاتصالات والسيطرة</small>
        </div>
        <div class="nav-tabs">
            <button class="nav-item active" id="tab-m" onclick="switchTab('m')">📋 نظام المنتسيات</button>
            <button class="nav-item" id="tab-o" onclick="switchTab('o')">📂 منتسيات مفتوحة</button>
            <button class="nav-item hidden" id="tab-i" onclick="switchTab('i')">💬 الاستفسارات</button>
            <button class="nav-item" id="tab-c" onclick="switchTab('c')">🚨 متابعات السيطرة</button>
            <button class="nav-item" id="tab-b" onclick="switchTab('b')">☕ الموظف</button>
            <button class="nav-item" id="tab-e" onclick="switchTab('e')">👤 إضافة موظف</button>
            <button class="nav-item hidden" id="tab-s" onclick="switchTab('s')">📊 إحصائية الموظفين</button>
        </div>
        <button class="user-profile-btn" id="profileBtn" onclick="openProfile()" style="display:none;">
            <div class="user-avatar">👤</div>
            <div class="user-info-mini">
                <div class="u-name"  id="sidebarName">—</div>
                <div class="u-title" id="sidebarTitle">—</div>
            </div>
        </button>
        <button class="btn-logout" onclick="doLogout()">تسجيل الخروج</button>
    </div>

    <div class="content-area">
        <div id="page-container"></div>
    </div>
</div>

<!-- ══ PROFILE MODAL ══ -->
<div class="modal-overlay hidden" id="profileModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeProfile()">✕</button>
        <div class="modal-avatar">👤</div>
        <h3 style="margin:0 0 5px;color:var(--accent-red);" id="modalName">—</h3>
        <p style="color:var(--text-dim);margin:0 0 25px;font-size:13px;" id="modalTitleTop">—</p>
        <div>
            <div class="info-row"><span class="info-label">الاسم الكامل</span><span class="info-value" id="modalNameDetail">—</span></div>
            <div class="info-row"><span class="info-label">المسمى الوظيفي</span><span class="info-value" id="modalTitleDetail">—</span></div>
            <div class="info-row"><span class="info-label">الرقم الوظيفي</span><span class="info-value emp-id-display" id="modalEmpId">—</span></div>
        </div>
    </div>
</div>

<!-- ══ DELIVERY MODAL ══ -->
<div class="modal-overlay hidden" id="deliveryModal">
    <div class="modal-box" style="width:480px;max-width:95vw;">
        <button class="modal-close" onclick="cancelDeliver()">✕</button>
        <div style="font-size:28px;margin-bottom:12px;">📦</div>
        <h3 style="margin:0 0 6px;color:var(--accent-red);">تسليم المنتسية</h3>
        <div id="deliveryItemInfo" style="font-size:13px;color:var(--text-dim);margin-bottom:24px;"></div>

        <!-- خياران -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;">
            <div class="break-btn-card" id="deliverSameBranchCard" onclick="selectDeliveryType('same')">
                <span class="break-icon">🏪</span>
                نفس الفرع
            </div>
            <div class="break-btn-card" id="deliverOtherBranchCard" onclick="selectDeliveryType('other')">
                <span class="break-icon">🔀</span>
                فرع آخر
            </div>
        </div>

        <!-- قائمة الفروع (تظهر عند اختيار فرع آخر) -->
        <div id="deliveryBranchSelector" style="display:none;margin-bottom:20px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div>
                    <label style="font-size:13px;color:var(--text-dim);display:block;margin-bottom:6px;">المحافظة</label>
                    <select id="deliverCitySelect" onchange="updateBranches('deliverCitySelect','deliverBranchSelect')"></select>
                </div>
                <div>
                    <label style="font-size:13px;color:var(--text-dim);display:block;margin-bottom:6px;">الفرع</label>
                    <select id="deliverBranchSelect"></select>
                </div>
            </div>
        </div>

        <button class="btn btn-main" style="width:100%;padding:14px;font-size:15px;" onclick="confirmDeliver()">✅ تأكيد التسليم</button>
    </div>
</div>

<!-- ══ MONTASIA CONFIRM OVERLAY ══ -->
<div class="break-blur-overlay hidden" id="montasiaConfirmOverlay">
    <div class="timer-card" style="max-width:460px;width:90%;">
        <div class="timer-label">⏳ جارٍ الحفظ...</div>
        <div id="confirmPreview" style="font-size:14px;color:var(--text-dim);margin-bottom:20px;line-height:1.8;background:rgba(255,255,255,0.04);padding:12px 18px;border-radius:14px;border:1px solid var(--border);"></div>
        <div class="timer-display" id="confirmCountdown">5</div>
        <div class="timer-status">سيتم الحفظ تلقائياً عند الوصول للصفر</div>
        <button class="btn-stop-timer" style="background:rgba(255,255,255,0.08);border:1px solid var(--border);" onclick="cancelMontasia()">↩ تراجع وعدم الإرسال</button>
    </div>
</div>

<!-- ══ BREAK TIMER OVERLAY ══ -->
<div class="break-blur-overlay hidden" id="breakOverlay">
    <div class="timer-card">
        <div class="timer-label" id="timerLabel">استراحة</div>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-status" id="timerStatus">أنت في استراحة</div>
        <button class="btn-stop-timer" onclick="stopBreak()">⏹ إيقاف</button>
    </div>
</div>

<!-- ══ SCRIPTS (load order matters) ══ -->
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/render.js"></script>
<script src="js/pages.js"></script>
<script src="js/ui.js"></script>
<script src="js/missing-items.js"></script>
<script src="js/inquiries.js"></script>
<script src="js/control.js"></script>
<script src="js/employees.js"></script>
<script src="js/breaks.js"></script>
<script src="js/stats.js"></script>
<script src="js/datepicker.js"></script>
<script>
    document.addEventListener("click", function(e) {
        if (e.target === document.getElementById("profileModal")) closeProfile();
    });
</script>
</body>
</html>
